<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anticimex — Persona Journey</title>
<style>
@font-face{font-family:'Anticimex Sans';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/AnticimexSans-Regular.woff2) format('woff2')}
@font-face{font-family:'Anticimex Sans';font-style:normal;font-weight:700;font-display:swap;src:url(fonts/AnticimexSans-Bold.woff2) format('woff2')}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue-10:#000f3b;--blue-20:#051e66;--blue-30:#0d2b88;
  --blue-60:#0862b7;--blue-70:#187ee0;--blue-80:#41a2ff;
  --blue-90:#d2dbe3;--blue-95:#d9ecff;--blue-100:#f8fbfe;
  --green-50:#2da96b;--green-70:#1ed68c;--green-90:#bff6db;--green-100:#f8fffc;
  --orange-40:#ff7c00;--orange-90:#feead9;
  --red-50:#e92525;--red-90:#f1d2d2;
  --neutral-40:#767676;--neutral-90:#f2f2f2;--neutral-95:#f6f6f6;--white:#fff;
  --text:rgba(0,0,0,.85);--text-secondary:#4a5568;
  --shadow:0 24px 64px -24px rgba(0,0,0,.08);
  --font:'Anticimex Sans',ui-sans-serif,system-ui,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--blue-90) var(--white)}
body{font-family:var(--font);background:var(--white);color:var(--text);line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:16px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--white)}::-webkit-scrollbar-thumb{background:var(--blue-90);border-radius:3px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:4.5rem;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;
  background:var(--white);border-bottom:1px solid var(--blue-95);transition:box-shadow .3s var(--ease)}
nav.scrolled{box-shadow:var(--shadow)}
.nav-logo{display:flex;align-items:center;gap:.75rem}
.nav-logo img{height:1.6rem;width:auto}
.nav-logo .doc-type{font-weight:400;font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);padding-left:.75rem;border-left:1px solid var(--blue-90)}
.back-link{font-size:.82rem;font-weight:700;color:var(--blue-60);text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:color .2s}
.back-link:hover{color:var(--blue-20)}

/* LAYOUT */
section{position:relative;padding:6rem 2.5rem;scroll-margin-top:4.5rem}
.container{max-width:1000px;margin:0 auto}
.angled{padding-bottom:9rem}
.angled::before{content:'';position:absolute;bottom:0;left:0;right:0;height:4.5rem;z-index:4;
  background:linear-gradient(to bottom right,transparent calc(50% - 1px),var(--blue-90) calc(50% - 1px),var(--blue-90) 50%,transparent 50%);pointer-events:none}
.angled::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4.5rem;z-index:3;
  background:var(--next-bg,var(--white));clip-path:polygon(100% 0,0 100%,100% 100%)}
.bg-white{background:var(--white)}
.bg-blue{background:var(--blue-100)}
.bg-green{background:var(--green-100)}
.bg-navy{background:var(--blue-30);color:var(--white)}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}

/* HERO */
#hero{min-height:90vh;display:flex;align-items:center;padding-top:7rem;padding-bottom:9rem;background:var(--blue-30);color:var(--white);position:relative;overflow:hidden}
#hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4.5rem;background:var(--white);clip-path:polygon(100% 0,0 100%,100% 100%)}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,var(--blue-20) 0%,var(--blue-30) 40%,#1038a0 100%)}
.hero-accent{position:absolute;top:5%;right:0;width:50vw;height:50vw;border-radius:50%;background:radial-gradient(circle,rgba(30,214,140,.08) 0%,rgba(24,126,224,.04) 40%,transparent 65%);pointer-events:none}
.hero-content{position:relative;z-index:2;max-width:700px}
.hero-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.6);margin-bottom:.75rem}
.hero-persona{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green-70);margin-bottom:1.5rem;
  display:inline-flex;align-items:center;gap:.6rem;padding:.45rem 1.1rem;border:1.5px solid rgba(30,214,140,.35);border-radius:9999px;background:rgba(30,214,140,.08)}
h1.hero-title{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;line-height:1.12;letter-spacing:-.02em;margin-bottom:1.5rem;color:var(--white)}
h1.hero-title em{font-style:normal;color:var(--green-70)}
.hero-desc{font-size:1.1rem;color:rgba(255,255,255,.78);max-width:580px;line-height:1.8;margin-bottom:2.5rem}
.hero-profile{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;padding:1.5rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:.5rem;max-width:520px}
.hero-profile-icon{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.hero-profile-details{display:grid;gap:.25rem}
.hero-profile-details h3{font-size:1rem;font-weight:700;color:var(--white)}
.hero-profile-details p{font-size:.88rem;color:rgba(255,255,255,.65);line-height:1.55}

/* PERSONA CONTEXT */
.context-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.context-card{padding:1.75rem;border:1px solid var(--blue-95);border-radius:.5rem;background:var(--white)}
.context-card h3{font-size:1rem;font-weight:700;color:var(--blue-20);margin-bottom:.5rem}
.context-card ul{list-style:none;margin-top:.5rem}
.context-card li{font-size:.9rem;color:var(--text);padding:.25rem 0;display:flex;align-items:baseline;gap:.6rem;line-height:1.6}
.context-card li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green-70);flex-shrink:0;transform:translateY(-.1em)}

/* JOURNEY TIMELINE */
.journey-stage{display:grid;grid-template-columns:80px 1fr;gap:2.5rem;position:relative;padding-bottom:3.5rem}
.journey-stage:last-child{padding-bottom:0}
.journey-stage:not(:last-child)::before{content:'';position:absolute;left:39px;top:60px;bottom:0;width:2px;background:var(--blue-95)}
.stage-marker{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.stage-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--white);position:relative;z-index:1}
.stage-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);text-align:center;white-space:nowrap}
.stage-content{padding-top:.25rem}
.stage-content h2{font-size:1.4rem;font-weight:700;color:var(--blue-20);margin-bottom:.15rem;line-height:1.25}
.stage-subtitle{font-size:.88rem;color:var(--text-secondary);margin-bottom:1.25rem;font-style:italic}

/* Stage inner cards */
.stage-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.s-card{padding:1.5rem;border:1px solid var(--blue-95);border-radius:.5rem;background:var(--white);transition:border-color .2s,box-shadow .3s}
.s-card:hover{border-color:var(--blue-90);box-shadow:var(--shadow)}
.s-card.full{grid-column:1/-1}
.s-card.highlight{background:var(--blue-100);border-color:var(--blue-95)}
.s-card.action{background:var(--green-100);border-color:rgba(30,214,140,.2)}
.s-card h4{font-size:.88rem;font-weight:700;color:var(--blue-20);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.s-card h4 .icon{font-size:1rem;line-height:1}
.s-card ul{list-style:none;margin-top:.35rem}
.s-card li{font-size:.88rem;color:var(--text);padding:.25rem 0;display:flex;align-items:baseline;gap:.6rem;line-height:1.6}
.s-card li::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;transform:translateY(-.1em)}
.s-card li::before{background:var(--green-70)}
.s-card.highlight li::before{background:var(--blue-60)}

/* Customer perspective grid */
.perspective{display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;margin-top:1.25rem;margin-bottom:1.25rem}
.persp-col{padding:1.25rem;border-radius:.5rem;border:1px solid var(--blue-95);background:var(--white)}
.persp-header{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.65rem;padding-bottom:.5rem;border-bottom:2px solid;display:flex;align-items:center;gap:.4rem}
.persp-col.feelings .persp-header{color:#8b5cf6;border-color:#8b5cf6}
.persp-col.actions .persp-header{color:var(--blue-60);border-color:var(--blue-60)}
.persp-col.interactions .persp-header{color:var(--green-50);border-color:var(--green-50)}
.persp-col.painpoints .persp-header{color:var(--red-50);border-color:var(--red-50)}
.persp-col.improvements .persp-header{color:var(--orange-40);border-color:var(--orange-40)}
.persp-col ul{list-style:none}
.persp-col li{font-size:.82rem;color:var(--text);padding:.2rem 0;line-height:1.55;display:flex;align-items:baseline;gap:.5rem}
.persp-col li::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0;transform:translateY(-.1em)}
.persp-col.feelings li::before{background:#8b5cf6}
.persp-col.actions li::before{background:var(--blue-60)}
.persp-col.interactions li::before{background:var(--green-50)}
.persp-col.painpoints li::before{background:var(--red-50)}
.persp-col.improvements li::before{background:var(--orange-40)}

/* Quote callout */
.quote{padding:1.25rem 1.5rem;border-radius:.5rem;border-left:3px solid;background:var(--blue-100);margin-top:1.25rem;margin-bottom:1rem}
.quote p{font-size:.95rem;font-style:italic;color:var(--blue-20);line-height:1.6}

/* Outcome strip */
.outcome{margin-top:1rem;padding:1rem 1.25rem;border-radius:.5rem;background:var(--green-100);border:1px solid rgba(30,214,140,.15);display:flex;align-items:flex-start;gap:.6rem}
.outcome::before{content:'';width:20px;height:20px;border-radius:50%;background:rgba(30,214,140,.15);border:1.5px solid var(--green-70);flex-shrink:0;margin-top:1px;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%232da96b' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='20 6 9 17 4 12'/%3E%3C/svg%3E");background-size:11px;background-repeat:no-repeat;background-position:center}
.outcome p{font-size:.88rem;color:var(--green-50);font-weight:700;line-height:1.55}

/* CLOSE */
#close{padding:5rem 2.5rem 6rem}
.close-statement{font-size:clamp(1.15rem,2.2vw,1.5rem);font-weight:700;line-height:1.45;color:rgba(255,255,255,.85);max-width:700px;margin-bottom:2rem}
.close-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:2rem}
.metric{text-align:center;padding:1.25rem;border:1px solid rgba(255,255,255,.12);border-radius:.5rem;background:rgba(255,255,255,.06)}
.metric .val{font-size:1.8rem;font-weight:700;color:var(--white);line-height:1}
.metric .lbl{font-size:.72rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;margin-top:.3rem}

footer{background:var(--blue-20);padding:1.5rem 2.5rem;text-align:center}
footer p{font-size:.72rem;color:rgba(255,255,255,.3)}
footer a{color:rgba(255,255,255,.5);text-decoration:none}
footer a:hover{color:rgba(255,255,255,.7)}

/* LOADING SKELETON */
.skeleton{position:relative;overflow:hidden;background:rgba(255,255,255,.06);border-radius:.5rem}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.skeleton-line{height:1rem;margin-bottom:.75rem;border-radius:.25rem;background:rgba(255,255,255,.08)}
.skeleton-line.w60{width:60%}
.skeleton-line.w80{width:80%}
.skeleton-line.w40{width:40%}
.skeleton-block{height:200px;margin-bottom:1.5rem;border-radius:.5rem;background:rgba(255,255,255,.06)}
#loading-state{display:flex;flex-direction:column;gap:1.5rem}
#error-state{display:none;text-align:center;padding:4rem 2rem}
#error-state h2{font-size:1.5rem;color:var(--red-50);margin-bottom:1rem}
#error-state p{color:var(--text-secondary);margin-bottom:2rem}
#error-state a{color:var(--blue-60);font-weight:700;text-decoration:none}
#content-state{display:none}

@media(max-width:1024px){
  .context-grid{grid-template-columns:1fr 1fr}
  .close-metrics{grid-template-columns:repeat(2,1fr)}
  .perspective{grid-template-columns:repeat(3,1fr)}
  .angled::before,.angled::after{height:3rem}
  .angled{padding-bottom:7rem}
  #hero::after{height:3rem}
  #hero{padding-bottom:7rem}
}
@media(max-width:768px){
  section{padding:3.5rem 1.25rem;scroll-margin-top:3.5rem}
  .context-grid,.stage-cards,.perspective{grid-template-columns:1fr}
  .s-card.full{grid-column:auto}
  .close-metrics{grid-template-columns:1fr 1fr}
  .journey-stage{grid-template-columns:50px 1fr;gap:1.25rem}
  .journey-stage:not(:last-child)::before{left:24px}
  .stage-dot{width:32px;height:32px;font-size:.65rem}
  h1.hero-title{font-size:2rem}
  .hero-profile{grid-template-columns:1fr}
  nav{height:3.5rem;padding:0 1.25rem}
  section{scroll-margin-top:3.5rem}
  .angled::before,.angled::after{height:2rem}
  .angled{padding-bottom:5rem}
  #hero::after{height:2rem}
  #hero{padding-bottom:5rem}
}
</style>
</head>
<body>

<nav id="mainNav">
  <div class="nav-logo"><img src="anticimex-logo.png" alt="Anticimex"> <span class="doc-type">Customer Journey</span></div>
  <a href="index.html" class="back-link">&larr; Back to Lifecycle Plan</a>
</nav>

<!-- LOADING STATE -->
<div id="loading-state">
  <section id="hero">
    <div class="hero-bg"></div>
    <div class="hero-accent"></div>
    <div class="container hero-content">
      <div class="skeleton-line w40"></div>
      <div class="skeleton-line w60" style="height:2.5rem;margin-bottom:1.5rem"></div>
      <div class="skeleton-line w80"></div>
      <div class="skeleton-line w60"></div>
      <div class="skeleton-block" style="height:100px;max-width:520px"></div>
    </div>
  </section>
</div>

<!-- ERROR STATE -->
<div id="error-state">
  <h2>Persona not found</h2>
  <p>This persona journey could not be loaded. It may have been removed or the link may be incorrect.</p>
  <a href="index.html">&larr; Back to Lifecycle Plan</a>
</div>

<!-- CONTENT STATE (populated by JS) -->
<div id="content-state"></div>

<script>
const SANITY_PROJECT = 'gccoxk2g';
const SANITY_DATASET = 'production';
const STAGES = [
  { num: '01', name: 'Awareness', color: '#6366f1' },
  { num: '02', name: 'Consideration', color: '#8b5cf6' },
  { num: '03', name: 'Decision', color: '#0862b7' },
  { num: '04', name: 'Service', color: '#2da96b' },
  { num: '05', name: 'Loyalty', color: '#ff7c00' }
];

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderList(items) {
  if (!items || !items.length) return '';
  return '<ul>' + items.map(i => '<li>' + esc(i) + '</li>').join('') + '</ul>';
}

function renderCards(cards) {
  if (!cards || !cards.length) return '';
  return '<div class="stage-cards">' + cards.map(c => {
    const cls = c.style === 'highlight' ? ' highlight' : c.style === 'action' ? ' action' : c.style === 'full' ? ' full' : '';
    return '<div class="s-card' + cls + '">' +
      '<h4><span class="icon">' + esc(c.icon || '') + '</span> ' + esc(c.title) + '</h4>' +
      renderList(c.items) +
      '</div>';
  }).join('') + '</div>';
}

function renderPerspective(stage, color) {
  const cols = [
    { key: 'feelings', label: 'Feelings', cls: 'feelings' },
    { key: 'actions', label: 'Actions', cls: 'actions' },
    { key: 'interactions', label: 'Interactions', cls: 'interactions' },
    { key: 'painpoints', label: 'Painpoints', cls: 'painpoints' },
    { key: 'improvements', label: 'Improvements', cls: 'improvements' }
  ];
  return '<div class="perspective">' + cols.map(col =>
    '<div class="persp-col ' + col.cls + '">' +
    '<div class="persp-header">' + col.label + '</div>' +
    renderList(stage[col.key]) +
    '</div>'
  ).join('') + '</div>';
}

function renderPersona(data) {
  const stagesHTML = (data.stages || []).map((stage, i) => {
    const cfg = STAGES[i] || STAGES[0];
    const isLast = i === (data.stages.length - 1);
    return '<div class="journey-stage reveal">' +
      '<div class="stage-marker">' +
        '<div class="stage-dot" style="background:' + cfg.color + '">' + cfg.num + '</div>' +
        '<div class="stage-label">' + cfg.name + '</div>' +
      '</div>' +
      '<div class="stage-content">' +
        '<h2>' + esc(stage.heading) + '</h2>' +
        '<p class="stage-subtitle">&ldquo;' + esc(stage.subtitle) + '&rdquo;</p>' +
        renderCards(stage.cards) +
        '<div class="quote" style="border-color:' + cfg.color + '">' +
          '<p>&ldquo;' + esc(stage.quote) + '&rdquo;</p>' +
        '</div>' +
        renderPerspective(stage, cfg.color) +
        '<div class="outcome"><p>' + esc(stage.outcome) + '</p></div>' +
      '</div>' +
    '</div>';
  }).join('');

  const contextHTML = (data.context || []).map((c, i) =>
    '<div class="context-card reveal d' + (i + 1) + '">' +
      '<h3>' + esc(c.title) + '</h3>' +
      renderList(c.items) +
    '</div>'
  ).join('');

  const metricsHTML = (data.metrics || []).map(m =>
    '<div class="metric"><div class="val">' + esc(m.value) + '</div><div class="lbl">' + esc(m.label) + '</div></div>'
  ).join('');

  return '<!-- HERO -->' +
  '<section id="hero">' +
    '<div class="hero-bg"></div>' +
    '<div class="hero-accent"></div>' +
    '<div class="container hero-content">' +
      '<div class="hero-label reveal">Customer Journey Map</div>' +
      '<div class="hero-persona reveal d1">' + esc(data.title || '') + '</div>' +
      '<h1 class="hero-title reveal d2">' + (data.heroTitle || '') + '</h1>' +
      '<p class="hero-desc reveal d3">' + esc(data.heroDesc || '') + '</p>' +
      '<div class="hero-profile reveal d4">' +
        '<div class="hero-profile-icon">' + esc(data.scenarioEmoji || data.emoji || '') + '</div>' +
        '<div class="hero-profile-details">' +
          '<h3>' + esc(data.scenarioTitle || 'The scenario') + '</h3>' +
          '<p>' + esc(data.scenarioText || '') + '</p>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</section>' +

  '<!-- PERSONA CONTEXT -->' +
  '<section id="context" class="bg-white angled" style="--next-bg:var(--blue-100);padding-top:8rem">' +
    '<div class="container">' +
      '<div class="context-grid">' + contextHTML + '</div>' +
    '</div>' +
  '</section>' +

  '<!-- JOURNEY -->' +
  '<section id="journey" class="bg-blue angled" style="--next-bg:var(--white);padding-top:8rem;padding-bottom:12rem">' +
    '<div class="container">' + stagesHTML + '</div>' +
  '</section>' +

  '<!-- CLOSE -->' +
  '<section id="close" class="bg-navy" style="padding-top:8rem">' +
    '<div class="container">' +
      '<div class="close-statement reveal">' + esc(data.closeStatement || '') + '</div>' +
      '<div class="close-metrics reveal d1">' + metricsHTML + '</div>' +
    '</div>' +
  '</section>' +

  '<footer>' +
    '<p>Anticimex &mdash; Customer Journey: ' + esc(data.title || '') + ' &mdash; <a href="index.html">Back to Lifecycle Plan</a></p>' +
  '</footer>';
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
    return;
  }

  try {
    const query = encodeURIComponent('*[_type == "persona" && _id == $id][0]');
    const url = 'https://' + SANITY_PROJECT + '.apicdn.sanity.io/v2024-01-01/data/query/' + SANITY_DATASET + '?query=' + query + '&$id=%22' + encodeURIComponent(id) + '%22';

    const res = await fetch(url);
    const json = await res.json();
    const data = json.result;

    if (!data) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
      return;
    }

    document.title = 'Anticimex \u2014 ' + (data.title || 'Persona Journey');

    const contentEl = document.getElementById('content-state');
    contentEl.innerHTML = renderPersona(data);
    contentEl.style.display = 'block';
    document.getElementById('loading-state').style.display = 'none';

    // Init reveal animations
    const ro = new IntersectionObserver(entries => {
      entries.forEach(x => {
        if (x.isIntersecting) { x.target.classList.add('visible'); ro.unobserve(x.target); }
      });
    }, { threshold: .08, rootMargin: '0px 0px -30px 0px' });
    contentEl.querySelectorAll('.reveal').forEach(el => ro.observe(el));

  } catch (err) {
    console.error('Failed to load persona:', err);
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
  }
}

// Nav scroll
const nav = document.getElementById('mainNav');
window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 40); });

init();
</script>
</body>
</html>
